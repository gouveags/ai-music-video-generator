services:
  postgres:
    image: postgres:16-alpine
    container_name: amvg-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-music_video}
      POSTGRES_USER: ${POSTGRES_USER:-music_video}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-music_video}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-music_video} -d ${POSTGRES_DB:-music_video}']
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: amvg-redis
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: amvg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  suno-api:
    build:
      context: ./infra/suno-api
      dockerfile: Dockerfile
    container_name: amvg-suno-api
    env_file:
      - .env
    ports:
      - '3000:3000'

  backend-api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: amvg-backend-api
    env_file:
      - .env
    environment:
      API_PORT: 8080
      FRONTEND_ORIGIN: http://localhost:4321
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
      SUNO_API_BASE_URL: http://suno-api:3000
    ports:
      - '8080:8080'
    volumes:
      - backend-tmp:/workspace/apps/backend/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      suno-api:
        condition: service_started

  backend-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: amvg-backend-worker
    command: ['npm', 'run', 'start:worker']
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
      SUNO_API_BASE_URL: http://suno-api:3000
    volumes:
      - backend-tmp:/workspace/apps/backend/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      suno-api:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: amvg-frontend
    environment:
      PUBLIC_API_BASE: http://localhost:8080/api/v1
    ports:
      - '4321:4321'
    depends_on:
      backend-api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:
  backend-tmp:
